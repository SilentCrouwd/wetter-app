<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wetter-app</title>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <button class="btn btn--back">
          <svg
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            class="svg svg--back"
            viewBox="0 0 24 24"
          >
            <path
              d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"
            />
          </svg>
        </button>

        <button class="btn btn--favorit">
          <svg
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            class="svg svg--favorit"
            viewBox="0 0 24 24"
          >
            <path
              d="M12,15.39L8.24,17.66L9.23,13.38L5.91,10.5L10.29,10.13L12,6.09L13.71,10.13L18.09,10.5L14.77,13.38L15.76,17.66M22,9.24L14.81,8.63L12,2L9.19,8.63L2,9.24L7.45,13.97L5.82,21L12,17.27L18.18,21L16.54,13.97L22,9.24Z"
            />
          </svg>
        </button>
      </div>

      <div class="main">
        <div class="lds-spinner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="main__current-info"></div>
        <div class="main__daily-info">
          <p class="daily-info__today"></p>

          <div class="daily-info__card"></div>
        </div>

        <div class="main__forecast">
          <p class="forecast__headline">Vorhersage für die nächsten 3 Tage:</p>
          <div class="forecast__days"></div>
        </div>
        <div class="main__additional"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
